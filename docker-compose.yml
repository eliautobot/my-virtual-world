services:
  virtual-world:
    build: .
    image: my-virtual-world:local
    container_name: my-virtual-world
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${VW_HOST_PORT:-8590}:${VW_PORT:-8590}"
    volumes:
      - vw-data:/data
      - ~/.openclaw:/openclaw:ro
      - ~/.openclaw/workspace/uploads:/openclaw/workspace/uploads
      # Optional native Hermes integration. Comment these three mounts out if you do not use Hermes.
      - ~/.hermes:/home/vw/.hermes
      - ~/.local/bin/hermes:/home/vw/.local/bin/hermes:ro
      - ~/.local/share/uv:/home/vw/.local/share/uv:ro
      # Optional native Codex integration. Override VW_CODEX_* if your Codex install lives elsewhere.
      - ~/.codex:/home/vw/.codex
    environment:
      - VW_PORT=${VW_PORT:-8590}
      - VW_HOST_PORT=${VW_HOST_PORT:-8590}
      - VW_DATA_DIR=/data
      - VW_OPENCLAW_PATH=/openclaw
      - VW_OPENCLAW_HOST_PATH=${VW_OPENCLAW_HOST_PATH:-${HOME}/.openclaw}
      - VW_GATEWAY_URL=${VW_GATEWAY_URL:-ws://host.docker.internal:18789}
      - VW_HERMES_ENABLED=${VW_HERMES_ENABLED:-true}
      - VW_HERMES_HOME=${VW_HERMES_HOME:-/home/vw/.hermes}
      - VW_HERMES_BIN=${VW_HERMES_BIN:-/home/vw/.hermes/hermes-agent/hermes}
      - VW_HERMES_TIMEOUT_SEC=${VW_HERMES_TIMEOUT_SEC:-600}
      - CODEX_HOME=${VW_CODEX_HOME:-/home/vw/.codex}
      - VW_CODEX_ENABLED=${VW_CODEX_ENABLED:-true}
      - VW_CODEX_HOME=${VW_CODEX_HOME:-/home/vw/.codex}
      - VW_CODEX_BIN=${VW_CODEX_BIN:-/home/vw/.codex/packages/standalone/current/bin/codex}
      - VW_CODEX_WORKSPACE_ROOT=${VW_CODEX_WORKSPACE_ROOT:-/data/codex-agents}
      - VW_CODEX_MAIN_WORKSPACE=${VW_CODEX_MAIN_WORKSPACE:-/data/codex-main}
      - VW_CODEX_TIMEOUT_SEC=${VW_CODEX_TIMEOUT_SEC:-900}
      - VW_CODEX_MODEL=${VW_CODEX_MODEL:-}
      - VW_CODEX_SANDBOX=${VW_CODEX_SANDBOX:-workspace-write}
      - VW_CODEX_APPROVAL_POLICY=${VW_CODEX_APPROVAL_POLICY:-never}
      - VW_CODEX_PREFER_APP_SERVER=${VW_CODEX_PREFER_APP_SERVER:-true}
      - VW_CODEX_INCLUDE_MAIN=${VW_CODEX_INCLUDE_MAIN:-true}
      - VW_CODEX_INCLUDE_NATIVE_AGENTS=${VW_CODEX_INCLUDE_NATIVE_AGENTS:-true}
      - VW_CODEX_REGISTER_NATIVE_AGENTS=${VW_CODEX_REGISTER_NATIVE_AGENTS:-true}
      - VW_LICENSE_STORE_ID=${VW_LICENSE_STORE_ID:-321733}
      - VW_LICENSE_PRODUCT_IDS=${VW_LICENSE_PRODUCT_IDS:-1140366}
      # Optional external provider relay for future non-Hermes providers.
      # Virtual World core features and native Hermes work with this unset.
      # - VW_AGENT_PLATFORM_PROVIDER_URL=http://host.docker.internal:PORT
      # - VW_TIMEZONE=America/New_York  # Optional server fallback only; UI renders browser-local time.
      # - VW_STATUS_FILE=              # Optional local status-file fallback path.
    restart: unless-stopped

  # Optional: Agent Browser (uncomment to enable only on trusted networks)
  # Configure inside Virtual World Settings -> Agent Browser:
  #   CDP URL: http://host.docker.internal:9222
  #   Viewer URL: https://localhost:6901
