services:
  virtual-world:
    build: .
    image: my-virtual-world:local
    container_name: my-virtual-world
    depends_on:
      - virtual-world-realtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${VW_HOST_PORT:-8590}:${VW_PORT:-8590}"
    volumes:
      - vw-data:/data
      # Agent editing/model switching needs write access to openclaw.json and agent workspace docs.
      - ~/.openclaw:/openclaw
      - ~/.openclaw/workspace/uploads:/openclaw/workspace/uploads
      # Optional native Hermes integration.
      # If your Hermes launcher stores absolute paths, set VW_HERMES_HOME,
      # VW_HERMES_BIN, and VW_HERMES_CONTAINER_UV to matching container paths.
      - ${VW_HERMES_HOST_HOME:-~/.hermes}:${VW_HERMES_HOME:-/home/vw/.hermes}
      - ${VW_HERMES_HOST_BIN:-~/.local/bin/hermes}:${VW_HERMES_BIN:-/home/vw/.local/bin/hermes}:ro
      - ${VW_HERMES_HOST_UV:-~/.local/share/uv}:${VW_HERMES_CONTAINER_UV:-/home/vw/.local/share/uv}:ro
      # Optional native Codex integration. Override VW_CODEX_* if your Codex install lives elsewhere.
      - ~/.codex:/home/vw/.codex
      # Optional native Claude Code setup fields. Claude Code provider runtime is not enabled yet.
      - ${VW_CLAUDE_CODE_HOST_HOME:-~/.claude}:${VW_CLAUDE_CODE_HOME:-/home/vw/.claude}
    environment:
      - VW_PORT=${VW_PORT:-8590}
      - VW_HOST_PORT=${VW_HOST_PORT:-8590}
      - VW_DATA_DIR=/data
      - VW_OPENCLAW_PATH=/openclaw
      - VW_OPENCLAW_HOST_PATH=${VW_OPENCLAW_HOST_PATH:-${HOME}/.openclaw}
      - VW_GATEWAY_URL=${VW_GATEWAY_URL:-ws://host.docker.internal:18789}
      - VW_REALTIME_ENABLED=${VW_REALTIME_ENABLED:-true}
      - VW_REALTIME_BROWSER_URL=${VW_REALTIME_BROWSER_URL:-ws://127.0.0.1:8591}
      - VW_REALTIME_URL=${VW_REALTIME_URL:-}
      - VW_REALTIME_ROOM=${VW_REALTIME_ROOM:-agent_runtime}
      - VW_REALTIME_PORT=${VW_REALTIME_PORT:-8591}
      - VW_WORLD_ACTION_HISTORY_MAX_BYTES=${VW_WORLD_ACTION_HISTORY_MAX_BYTES:-8388608}
      - VW_WORLD_ACTION_HISTORY_RECORD_MAX_BYTES=${VW_WORLD_ACTION_HISTORY_RECORD_MAX_BYTES:-262144}
      - VW_MOVE_INTENT_HISTORY_MAX_RECORDS=${VW_MOVE_INTENT_HISTORY_MAX_RECORDS:-1000}
      - VW_MOVE_INTENT_HISTORY_MAX_BYTES=${VW_MOVE_INTENT_HISTORY_MAX_BYTES:-2097152}
      - VW_MOVE_INTENT_HISTORY_RECORD_MAX_BYTES=${VW_MOVE_INTENT_HISTORY_RECORD_MAX_BYTES:-8192}
      - VW_MOVE_INTENT_ACTIVE_RECORD_MAX_BYTES=${VW_MOVE_INTENT_ACTIVE_RECORD_MAX_BYTES:-262144}
      - VW_WORLD_ACTION_EVENTS_MAX_EVENTS=${VW_WORLD_ACTION_EVENTS_MAX_EVENTS:-1000}
      - VW_WORLD_ACTION_EVENTS_MAX_BYTES=${VW_WORLD_ACTION_EVENTS_MAX_BYTES:-2097152}
      - VW_WORLD_ACTION_EVENT_RECORD_MAX_BYTES=${VW_WORLD_ACTION_EVENT_RECORD_MAX_BYTES:-8192}
      - VW_WORLD_META_BACKUP_INTERVAL_SEC=${VW_WORLD_META_BACKUP_INTERVAL_SEC:-300}
      - VW_WORLD_META_STALE_TMP_MAX_AGE_SEC=${VW_WORLD_META_STALE_TMP_MAX_AGE_SEC:-3600}
      - VW_LIVE_AGENT_COLLECTION_MAX_BYTES=${VW_LIVE_AGENT_COLLECTION_MAX_BYTES:-262144}
      - VW_LIVE_AGENT_LOOP_STATE_MAX_BYTES=${VW_LIVE_AGENT_LOOP_STATE_MAX_BYTES:-8388608}
      - VW_LIVE_AGENT_INTERNAL_NOTES_MAX_BYTES=${VW_LIVE_AGENT_INTERNAL_NOTES_MAX_BYTES:-1048576}
      - VW_LIVE_AGENT_INTERNAL_NOTE_DETAILS_MAX_BYTES=${VW_LIVE_AGENT_INTERNAL_NOTE_DETAILS_MAX_BYTES:-24576}
      - VW_LIVE_AGENT_INTERNAL_NOTE_RECORD_MAX_BYTES=${VW_LIVE_AGENT_INTERNAL_NOTE_RECORD_MAX_BYTES:-32768}
      - VW_LIVE_AGENT_PLANNER_TRANSCRIPTS_MAX_BYTES=${VW_LIVE_AGENT_PLANNER_TRANSCRIPTS_MAX_BYTES:-2097152}
      - VW_LIVE_AGENT_PLANNER_TRANSCRIPT_RECORD_MAX_BYTES=${VW_LIVE_AGENT_PLANNER_TRANSCRIPT_RECORD_MAX_BYTES:-49152}
      - VW_LIVE_AGENT_PLANNER_FULL_TURNS_PER_AGENT=${VW_LIVE_AGENT_PLANNER_FULL_TURNS_PER_AGENT:-8}
      - VW_LIVE_AGENT_PROMPT_CHAR_BUDGET=${VW_LIVE_AGENT_PROMPT_CHAR_BUDGET:-6000}
      - VW_LIVE_AGENT_MODEL_CIRCUIT_FAILURE_THRESHOLD=${VW_LIVE_AGENT_MODEL_CIRCUIT_FAILURE_THRESHOLD:-2}
      - VW_LIVE_AGENT_MODEL_CIRCUIT_BASE_SEC=${VW_LIVE_AGENT_MODEL_CIRCUIT_BASE_SEC:-180}
      - VW_LIVE_AGENT_MODEL_CIRCUIT_MAX_SEC=${VW_LIVE_AGENT_MODEL_CIRCUIT_MAX_SEC:-1800}
      - VW_HERMES_ENABLED=${VW_HERMES_ENABLED:-true}
      - VW_HERMES_HOME=${VW_HERMES_HOME:-/home/vw/.hermes}
      - VW_HERMES_BIN=${VW_HERMES_BIN:-/home/vw/.local/bin/hermes}
      - VW_HERMES_TIMEOUT_SEC=${VW_HERMES_TIMEOUT_SEC:-600}
      - VW_HERMES_API_URL=${VW_HERMES_API_URL:-http://127.0.0.1:8642}
      - VW_HERMES_API_KEY=${VW_HERMES_API_KEY:-}
      - VW_HERMES_PREFER_API=${VW_HERMES_PREFER_API:-true}
      - VW_HERMES_AUTO_START_PROFILE_APIS=${VW_HERMES_AUTO_START_PROFILE_APIS:-true}
      - VW_HERMES_AUTO_START_DEFAULT_API=${VW_HERMES_AUTO_START_DEFAULT_API:-true}
      - VW_HERMES_API_PROFILE_PORT_BASE=${VW_HERMES_API_PROFILE_PORT_BASE:-8643}
      - CODEX_HOME=${VW_CODEX_HOME:-/home/vw/.codex}
      - VW_CODEX_ENABLED=${VW_CODEX_ENABLED:-true}
      - VW_CODEX_HOME=${VW_CODEX_HOME:-/home/vw/.codex}
      - VW_CODEX_BIN=${VW_CODEX_BIN:-/home/vw/.codex/packages/standalone/current/bin/codex}
      - VW_CODEX_WORKSPACE_ROOT=${VW_CODEX_WORKSPACE_ROOT:-/data/codex-agents}
      - VW_CODEX_MAIN_WORKSPACE=${VW_CODEX_MAIN_WORKSPACE:-/data/codex-main}
      - VW_CODEX_TIMEOUT_SEC=${VW_CODEX_TIMEOUT_SEC:-900}
      - VW_CODEX_MODEL=${VW_CODEX_MODEL:-}
      - VW_CODEX_SANDBOX=${VW_CODEX_SANDBOX:-workspace-write}
      - VW_CODEX_APPROVAL_POLICY=${VW_CODEX_APPROVAL_POLICY:-never}
      - VW_CODEX_PREFER_APP_SERVER=${VW_CODEX_PREFER_APP_SERVER:-true}
      - VW_CODEX_INCLUDE_MAIN=${VW_CODEX_INCLUDE_MAIN:-true}
      - VW_CODEX_INCLUDE_NATIVE_AGENTS=${VW_CODEX_INCLUDE_NATIVE_AGENTS:-true}
      - VW_CODEX_REGISTER_NATIVE_AGENTS=${VW_CODEX_REGISTER_NATIVE_AGENTS:-true}
      - CLAUDE_CONFIG_DIR=${VW_CLAUDE_CODE_HOME:-/home/vw/.claude}
      - VW_CLAUDE_CODE_ENABLED=${VW_CLAUDE_CODE_ENABLED:-false}
      - VW_CLAUDE_CODE_HOME=${VW_CLAUDE_CODE_HOME:-/home/vw/.claude}
      - VW_CLAUDE_CODE_BIN=${VW_CLAUDE_CODE_BIN:-claude}
      - VW_CLAUDE_CODE_WORKSPACE_ROOT=${VW_CLAUDE_CODE_WORKSPACE_ROOT:-/data/claude-code-agents}
      - VW_CLAUDE_CODE_MAIN_WORKSPACE=${VW_CLAUDE_CODE_MAIN_WORKSPACE:-/data/claude-code-main}
      - VW_CLAUDE_CODE_TIMEOUT_SEC=${VW_CLAUDE_CODE_TIMEOUT_SEC:-900}
      - VW_CLAUDE_CODE_MODEL=${VW_CLAUDE_CODE_MODEL:-}
      - VW_CLAUDE_CODE_PERMISSION_MODE=${VW_CLAUDE_CODE_PERMISSION_MODE:-acceptEdits}
      - VW_CLAUDE_CODE_INCLUDE_MAIN=${VW_CLAUDE_CODE_INCLUDE_MAIN:-true}
      - VW_CLAUDE_CODE_INCLUDE_NATIVE_AGENTS=${VW_CLAUDE_CODE_INCLUDE_NATIVE_AGENTS:-true}
      - VW_CLAUDE_CODE_REGISTER_NATIVE_AGENTS=${VW_CLAUDE_CODE_REGISTER_NATIVE_AGENTS:-true}
      - VW_LICENSE_STORE_ID=${VW_LICENSE_STORE_ID:-321733}
      - VW_LICENSE_PRODUCT_IDS=${VW_LICENSE_PRODUCT_IDS:-1140366}
      # Optional external provider relay for future non-Hermes providers.
      # Virtual World core features and native Hermes work with this unset.
      # - VW_AGENT_PLATFORM_PROVIDER_URL=http://host.docker.internal:PORT
      # - VW_TIMEZONE=America/New_York  # Optional server fallback only; UI renders browser-local time.
      # - VW_STATUS_FILE=              # Optional local status-file fallback path.
    restart: unless-stopped

  virtual-world-realtime:
    build:
      context: .
      target: realtime
    image: my-virtual-world-realtime:local
    container_name: my-virtual-world-realtime
    ports:
      - "${VW_REALTIME_HOST_PORT:-8591}:${VW_REALTIME_PORT:-8591}"
    volumes:
      - vw-data:/data
    environment:
      - VW_DATA_DIR=/data
      - VW_REALTIME_HOST=0.0.0.0
      - VW_REALTIME_PORT=${VW_REALTIME_PORT:-8591}
      - VW_REALTIME_ROOM=${VW_REALTIME_ROOM:-agent_runtime}
      - VW_REALTIME_MAX_PAYLOAD_BYTES=${VW_REALTIME_MAX_PAYLOAD_BYTES:-1048576}
    restart: unless-stopped

  # Optional: Agent Browser (uncomment to enable only on trusted networks)
  # Configure inside Virtual World Settings -> Agent Browser:
  #   CDP URL: http://host.docker.internal:9222
